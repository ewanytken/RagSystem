system:
  name: "RAG System"
  version: "0.1"

paths:
  documents_dir: "documents"
  models_dir: "models"

templates:
  prompt_template: "prompt_template_eng"

embedding:
  models: "intfloat/multilingual-e5-large"
  batch_size: 32

gliner:
  ticket: "urchade/gliner_multi-v2.1"
  threshold: 0.6
  local_only: False

gliner2:
  ticket: "fastino/gliner2-base-v1"
  threshold: 0.3

graph:
  extractor_prompt: "template_two"
  limit: 10

rag:
  chunk_size: 2000
  chunk_overlap: 150
  retrieval_limit: 5
  temperature: 0.5
  top_p: 0.9
  max_length: 1500

llm_local:
  model: "Qwen/Qwen3-4B-Instruct-2507"
  max_new_tokens: 2000
  temperature: 0.7
  top_p: 0.9
  top_k: 50
  do_sample: True
  num_return_sequences: 1
  repetition_penalty: 1.1
  no_repeat_ngram_size: 3
  early_stopping: True

tokenizer_local:
  add_special_tokens: True
  padding: True
  truncation: True
  use_fast: True
  padding_side: "left"
  truncation_side: "left"
  max_length: 2000

quantization:
  load_in_8bit: True
  llm_int8_threshold: 6.0
  llm_int8_has_fp16_weight: False

ollama:
  model: "llama3.2:latest"
  url: "http://localhost:11434"
  timeout: 60
  temperature: 0.5
  top_p: 0.9
  max_length: 1500

external_service:
  model: "openai/gpt-4o"
  url: "https://openrouter.ai/api/v1"
  api_key: ""

giga:
  authorization: ""
  uuid: ""

tickets:
  one_model: "Felladrin/TinyMistral-248M-Chat-v3"
  two_model: "Qwen/Qwen3-4B-Instruct-2507"
  default: "default"