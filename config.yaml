system:
  name: "RAG System"
  version: "0.1"

paths:
  documents_dir: "../documents"
  models_dir: "models"
  prompts_templates:
    extraction_template: "extraction_template_eng"
    prompt_template: "prompt_template"

models:
  llm: "llama3.2:latest"

embedding:
  models: "intfloat/multilingual-e5-large"
  batch_size: 32

gliner:
  ticket: "urchade/gliner_multi-v2.1"
  threshold: 0.1

graph:
  prompts: "extraction_template_eng"
  limit: 10

rag:
  chunk_size: 1000
  chunk_overlap: 150
  retrieval_limit: 5
  temperature: 0.5
  top_p: 0.9
  max_length: 1500

ollama:
  url: "http://localhost:11434"
  timeout: 60
  temperature: 0.5
  top_p: 0.9
  max_length: 1500